<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiverr Remote Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1dbf73;
            --primary-dark: #19a461;
            --bg-dark: #0e0e0e;
            --bg-card: #1a1a1a;
            --bg-hover: #252525;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border: #333;
            --online: #1dbf73;
            --offline: #ff4d4d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0e0e0e 0%, #1a1a1a 100%);
        }

        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .error-message {
            color: var(--offline);
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Main Dashboard */
        #dashboard {
            display: none;
        }

        /* Header */
        .header {
            background: var(--bg-card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-dark);
            border-radius: 20px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--offline);
        }

        .status-dot.online {
            background: var(--online);
        }

        /* Main Content */
        .main-content {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Sidebar - Conversations List */
        .sidebar {
            width: 350px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .conversations {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .conversation-item:hover {
            background: var(--bg-hover);
        }

        .conversation-item.active {
            background: var(--bg-hover);
            border-left: 3px solid var(--primary);
        }

        .conversation-item.unread {
            background: rgba(29, 191, 115, 0.1);
        }

        .conv-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .conv-username {
            font-weight: 600;
            font-size: 14px;
        }

        .conv-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .conv-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .chat-header {
            padding: 15px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            font-size: 16px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.incoming {
            justify-content: flex-start;
        }

        .message.outgoing {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
        }

        .message.incoming .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .message.outgoing .message-bubble {
            background: var(--primary);
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            resize: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-send:hover {
            background: var(--primary-dark);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Notification Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--online);
        }

        .toast.error {
            border-color: var(--offline);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                display: flex;
            }

            .chat-area {
                display: none;
            }

            .chat-area.active {
                display: flex;
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
            }

            .back-button {
                display: block;
            }
        }

        @media (min-width: 769px) {
            .back-button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h1>🔐 Fiverr Monitor</h1>
            <div id="login-error" class="error-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard">
        <header class="header">
            <h1>💬 Fiverr Remote Monitor</h1>
            <div class="header-right">
                <div class="agent-status">
                    <div class="status-dot" id="agent-status-dot"></div>
                    <span id="agent-status-text">Agent Offline</span>
                </div>
                <button class="btn-primary" onclick="logout()" style="width: auto; padding: 8px 16px;">Logout</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>📥 Conversations</h2>
                </div>
                <div class="conversations" id="conversations">
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                        <p>Waiting for messages...</p>
                        <p style="font-size: 12px; margin-top: 10px;">Make sure the agent is running</p>
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area" id="chat-area">
                <div class="chat-header">
                    <button class="back-button" onclick="closeChat()" style="background: none; border: none; color: white; font-size: 20px; margin-right: 10px; cursor: pointer;">←</button>
                    <h3 id="chat-title">Select a conversation</h3>
                </div>
                <div class="messages-container" id="messages">
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                        </svg>
                        <p>Select a conversation to view messages</p>
                    </div>
                </div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
                        <button class="btn-send" id="send-btn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Configuration
        const CONFIG = {
            SERVER_URL: 'https://your-app.onrender.com',
            API_BASE: 'https://your-app.onrender.com'
        };

        // State
        let socket = null;
        let isAuthenticated = false;
        let conversations = new Map();
        let currentConversation = null;
        let messages = new Map();

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const conversationsEl = document.getElementById('conversations');
        const messagesEl = document.getElementById('messages');
        const chatTitle = document.getElementById('chat-title');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const agentStatusDot = document.getElementById('agent-status-dot');
        const agentStatusText = document.getElementById('agent-status-text');

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    isAuthenticated = true;
                    loginScreen.style.display = 'none';
                    dashboard.style.display = 'block';
                    connectWebSocket();
                    requestNotificationPermission();
                } else {
                    loginError.textContent = data.error || 'Login failed';
                }
            } catch (error) {
                loginError.textContent = 'Connection error. Is the server running?';
            }
        });

        // WebSocket Connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = io(CONFIG.SERVER_URL, {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('Connected to server');
            });

            socket.on('agent_connected', (data) => {
                updateAgentStatus(true);
                showToast('Agent connected', 'success');
            });

            socket.on('agent_disconnected', (data) => {
                updateAgentStatus(false);
                showToast('Agent disconnected', 'error');
            });

            socket.on('new_message', (data) => {
                handleNewMessage(data);
            });

            socket.on('reply_sent', (data) => {
                if (currentConversation === data.conversation_id) {
                    addMessageToChat({
                        text: data.message || 'Message sent',
                        sender: 'you',
                        timestamp: new Date().toISOString()
                    });
                }
                showToast('Reply sent!', 'success');
            });

            socket.on('status', (data) => {
                updateAgentStatus(data.agents_online > 0);
            });
        }

        // Update Agent Status
        function updateAgentStatus(online) {
            if (online) {
                agentStatusDot.classList.add('online');
                agentStatusText.textContent = 'Agent Online';
            } else {
                agentStatusDot.classList.remove('online');
                agentStatusText.textContent = 'Agent Offline';
            }
        }

        // Handle New Message
        function handleNewMessage(data) {
            const { conversation, message } = data;

            // Store conversation
            conversations.set(conversation.conversation_id, conversation);

            // Store message
            if (!messages.has(conversation.conversation_id)) {
                messages.set(conversation.conversation_id, []);
            }
            messages.get(conversation.conversation_id).push(message);

            // Update UI
            renderConversations();

            // Show notification
            showNotification(`New message from ${conversation.username}`, message.text);

            // If viewing this conversation, add message
            if (currentConversation === conversation.conversation_id) {
                addMessageToChat(message);
            }
        }

        // Render Conversations
        function renderConversations() {
            if (conversations.size === 0) {
                conversationsEl.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                        <p>Waiting for messages...</p>
                    </div>
                `;
                return;
            }

            conversationsEl.innerHTML = '';
            conversations.forEach((conv, id) => {
                const div = document.createElement('div');
                div.className = `conversation-item ${id === currentConversation ? 'active' : ''} ${conv.unread ? 'unread' : ''}`;
                div.innerHTML = `
                    <div class="conv-header">
                        <span class="conv-username">${conv.username}</span>
                        <span class="conv-time">${formatTime(conv.timestamp)}</span>
                    </div>
                    <div class="conv-preview">${conv.last_message}</div>
                `;
                div.onclick = () => openConversation(id);
                conversationsEl.appendChild(div);
            });
        }

        // Open Conversation
        function openConversation(id) {
            currentConversation = id;
            const conv = conversations.get(id);
            chatTitle.textContent = conv.username;

            // Render messages
            messagesEl.innerHTML = '';
            const convMessages = messages.get(id) || [];
            convMessages.forEach(msg => addMessageToChat(msg));

            // Update active state
            document.querySelectorAll('.conversation-item').forEach(el => {
                el.classList.remove('active');
            });
            event.target.closest('.conversation-item')?.classList.add('active');

            // Show chat area on mobile
            document.getElementById('chat-area').classList.add('active');

            // Mark as read
            conv.unread = false;
            renderConversations();
        }

        // Close Chat (mobile)
        function closeChat() {
            document.getElementById('chat-area').classList.remove('active');
            currentConversation = null;
        }

        // Add Message to Chat
        function addMessageToChat(message) {
            const div = document.createElement('div');
            div.className = `message ${message.sender === 'you' ? 'outgoing' : 'incoming'}`;
            div.innerHTML = `
                <div class="message-bubble">
                    ${escapeHtml(message.text)}
                    <div class="message-time">${formatTime(message.timestamp)}</div>
                </div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // Send Message
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentConversation) return;

            sendBtn.disabled = true;

            socket.emit('send_reply', {
                conversation_id: currentConversation,
                message: text
            });

            messageInput.value = '';
            sendBtn.disabled = false;
        }

        // Enter key to send
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Logout
        function logout() {
            isAuthenticated = false;
            if (socket) socket.disconnect();
            loginScreen.style.display = 'flex';
            dashboard.style.display = 'none';
        }

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Browser Notifications
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        function showNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '/favicon.ico' });
            }
        }

        // Utility Functions
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</body>
</html>
